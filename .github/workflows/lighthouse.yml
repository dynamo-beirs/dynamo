name: Lighthouse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  static-dist-dir:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lighthouse against static files
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          temporaryPublicStorage: true